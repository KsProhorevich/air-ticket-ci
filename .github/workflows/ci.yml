name: CI Pipeline

permissions:
  contents: read

on:
  workflow_dispatch:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  ALLURE_RESULTS_DIR: allure-results

jobs:
  actionlint:
    name: Lint GitHub workflows
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install actionlint
        run: |
          bash <(curl --proto '=https' --tlsv1.2 -fsSL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          sudo mv actionlint /usr/local/bin/actionlint

      - name: Validate workflows
        run: actionlint -color .github/workflows/*.yml

  unit-tests:
    runs-on: ${{ matrix.os }}

    defaults:
      run:
        shell: bash

    strategy:
      fail-fast: false
      matrix:
        node-version: [18.x, 20.x, 22.x]
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Restore node_modules
        uses: actions/cache@v4
        id: node-modules-cache
        with:
          path: node_modules
          key: deps-${{ runner.os }}-node-${{ matrix.node-version }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: npm ci

      - run: mkdir -p allure-results

      - name: Run unit tests
        run: npm run test:unit

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-allure-${{ runner.os }}-node-${{ matrix.node-version }}
          if-no-files-found: ignore
          path: allure-results/

  api-tests:
    runs-on: ${{ matrix.os }}

    defaults:
      run:
        shell: bash

    strategy:
      fail-fast: false
      matrix:
        node-version: [18.x, 20.x, 22.x]
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Restore node_modules
        uses: actions/cache@v4
        id: node-modules-cache
        with:
          path: node_modules
          key: deps-${{ runner.os }}-node-${{ matrix.node-version }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Remove stale results
        run: rm -rf allure-results && mkdir -p allure-results

      - name: Start server (как в методичке; сами API-тесты ходят через supertest)
        run: |
          npm start &
          npx wait-on "http://127.0.0.1:3000/api/status" --timeout 120000 --httpTimeout 10000 --interval 2000 --validateStatus 200

      - name: Run API tests (Cucumber + Allure)
        run: npm run test:api

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-allure-${{ runner.os }}-node-${{ matrix.node-version }}
          if-no-files-found: warn
          path: allure-results/

  ui-tests:
    runs-on: ${{ matrix.os }}

    defaults:
      run:
        shell: bash

    strategy:
      fail-fast: false
      matrix:
        node-version: [18.x, 20.x, 22.x]
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Restore node_modules
        uses: actions/cache@v4
        id: node-modules-cache
        with:
          path: node_modules
          key: deps-${{ runner.os }}-node-${{ matrix.node-version }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ matrix.node-version }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-${{ matrix.node-version }}-

      - name: Install Playwright (Chromium) + системные зависимости
        run: npx playwright install chromium --with-deps

      - name: Remove stale results
        run: rm -rf allure-results playwright-report test-results && mkdir -p allure-results

      - name: Start server and run UI tests
        run: |
          npm start &
          npx wait-on "http://127.0.0.1:3000/api/status" --timeout 120000 --httpTimeout 10000 --interval 2000 --validateStatus 200
          npm run test:ui

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-${{ runner.os }}-node-${{ matrix.node-version }}
          if-no-files-found: ignore
          path: |
            allure-results/
            playwright-report/
            test-results/

  allure-report:
    runs-on: ubuntu-latest
    needs: [unit-tests, api-tests, ui-tests]
    if: always()

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - name: Restore node_modules
        uses: actions/cache@v4
        id: node-modules-cache
        with:
          path: node_modules
          key: deps-${{ runner.os }}-node-22.x-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: downloaded/

      - name: Generate merged report
        run: |
          set -euo pipefail

          mapfile -t inputs < <(find downloaded -type d -path '**/allure-results' 2>/dev/null || true)

          if [[ ${#inputs[@]} -eq 0 ]]; then
            mapfile -t inputs < <(find downloaded -mindepth 1 -maxdepth 1 -type d ! -path '**/.*' 2>/dev/null || true)
          fi

          if [[ ${#inputs[@]} -eq 0 ]]; then
            mapfile -t inputs < <(find downloaded -type f -name '*-result.json' -exec dirname {} \; 2>/dev/null | sort -u || true)
          fi

          if [[ ${#inputs[@]} -eq 0 ]]; then
            echo "Не удалось найти каталоги с результатами Allure"
            exit 1
          fi

          npx allure generate "${inputs[@]}" --clean -o allure-report

      - name: Upload Allure HTML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-html
          path: allure-report/

  deploy-pages:
    runs-on: ubuntu-latest
    needs: allure-report
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    concurrency:
      group: pages-${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: false

    permissions:
      contents: write

    steps:
      - name: Download Allure HTML
        uses: actions/download-artifact@v4
        with:
          name: allure-report-html
          path: gh-pages-publish/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: gh-pages-publish
          destination_dir: allure-reports/run-${{ github.run_number }}
          force_orphan: false

  docker-tests:
    name: Tests in Docker (продвинутый уровень)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        run: docker build -t air-ticket-ci:ci .

      - name: Run full suite inside container
        run: docker run --rm air-ticket-ci:ci

  notify:
    runs-on: ubuntu-latest
    needs: [unit-tests, api-tests, ui-tests]

    defaults:
      run:
        shell: bash

    if: always()

    steps:
      - name: Telegram
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          UNIT="${{ needs.unit-tests.result }}"
          API="${{ needs.api-tests.result }}"
          UI="${{ needs.ui-tests.result }}"

          NOTE=""
          if [[ "$UNIT" == "skipped" || "$API" == "skipped" || "$UI" == "skipped" ]]; then
            NOTE=" (skipped часто означает, что задача зависела от упавшей джобы либо прогон отменён; см. вкладку Jobs.)"
          fi

          if [[ "$UNIT" == "success" && "$API" == "success" && "$UI" == "success" ]]; then
            MSG="✅ CI успешно: ${{ github.repository }} #${{ github.run_number }}. Все задачи прошли. ${RUN_URL}"
          else
            MSG="❌ CI с ошибкой: ${{ github.repository }} #${{ github.run_number }}. Результаты — unit:${UNIT}, api:${API}, ui:${UI}.${NOTE} ${RUN_URL}"
          fi

          if [[ -z "$TELEGRAM_TOKEN" || -z "$TELEGRAM_CHAT_ID" ]]; then
            echo "Secrets TELEGRAM_TOKEN / TELEGRAM_CHAT_ID не заданы — уведомление пропущено."
            exit 0
          fi

          curl -fsS -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${MSG}"
