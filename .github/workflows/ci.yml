name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  ALLURE_RESULTS_DIR: allure-results

# =========================
# UNIT TESTS (Jest)
# =========================
jobs:

  unit-tests:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit

      - name: Upload unit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-results-${{ matrix.os }}-${{ matrix.node-version }}
          path: allure-results/

# =========================
# API TESTS (Cucumber)
# =========================
  api-tests:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Start server
        run: |
          npm start &
          npx wait-on http://localhost:3000/api/status

      - name: Run API tests
        run: npm run test:api

      - name: Upload API results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-results-${{ matrix.node-version }}
          path: allure-results/

# =========================
# UI TESTS (Playwright)
# =========================
  ui-tests:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Start server
        run: |
          npm start &
          npx wait-on http://localhost:3000/api/status

      - name: Run UI tests
        run: npm run test:ui

      - name: Upload UI results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-results-${{ matrix.os }}-${{ matrix.node-version }}
          path: playwright-report/

# =========================
# ALLURE REPORT GENERATION
# =========================
  allure-report:
    runs-on: ubuntu-latest
    needs: [unit-tests, api-tests, ui-tests]
    if: always()

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-results/

      - name: Merge results
        run: |
          mkdir -p allure-results
          find all-results -type f -name "*.json" -exec cp {} allure-results/ \; || true

      - name: Generate Allure report
        run: npm run allure:generate

      - name: Upload Allure report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/

# =========================
# GITHUB PAGES DEPLOY
# =========================
  deploy-report:
    runs-on: ubuntu-latest
    needs: allure-report
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Download report
        uses: actions/download-artifact@v4
        with:
          name: allure-report
          path: report/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: report/allure-report

# =========================
# TELEGRAM NOTIFICATION
# =========================
  notify:
    runs-on: ubuntu-latest
    needs: [unit-tests, api-tests, ui-tests]
    if: always()

    steps:
      - name: Send Telegram message
        run: |
          STATUS="✅ CI SUCCESS"
          
          if [ "${{ needs.unit-tests.result }}" != "success" ] || \
             [ "${{ needs.api-tests.result }}" != "success" ] || \
             [ "${{ needs.ui-tests.result }}" != "success" ]; then
            STATUS="❌ CI FAILED"
          fi

          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage \
          -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
          -d text="$STATUS | Repo: ${{ github.repository }} | Run: ${{ github.run_number }}"